<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Proxy Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --primary: #bb86fc;
      --primary-hover: #9c68de;
      --error: #cf6679;
      --success: #03dac6;
      --warning: #f6ea8c;
      --border: #333333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      color: var(--primary);
      font-size: 24px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #2c2c2c;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    button {
      padding: 12px 24px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s, transform 0.1s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    #video-container {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Logs Section */
    .logs-container {
      background: #0d0d0d;
      border-radius: 8px;
      border: 1px solid var(--border);
      height: 250px;
      overflow-y: auto;
      padding: 15px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .logs-header h3 {
      margin: 0;
      font-size: 16px;
      color: var(--text-muted);
    }

    .clear-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 12px;
      font-weight: normal;
    }
    .clear-btn:hover { background: #333; color: white; }

    .log-entry { margin-bottom: 5px; word-wrap: break-word; }
    .log-time { color: #888; margin-right: 8px; font-size: 12px; }
    .log-info { color: var(--success); }
    .log-error { color: var(--error); font-weight: bold; }
    .log-warning { color: var(--warning); }
    
    footer {
      margin-top: 30px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Streaming Proxy Player</h1>
      
      <div class="input-group">
        <input type="text" id="url-input" placeholder="Enter .m3u8 URL (e.g., https://example.com/playlist.m3u8)">
        <button id="load-btn">Load Stream</button>
      </div>

      <div id="video-container">
        <video id="video" controls></video>
      </div>
    </div>

    <div class="card">
      <div class="logs-header">
        <h3>Console Logs</h3>
        <button class="clear-btn" id="clear-logs-btn">Clear Logs</button>
      </div>
      <div class="logs-container" id="logs">
        <div class="log-entry"><span class="log-info">Ready to load stream...</span></div>
      </div>
    </div>
  </div>

  <footer>
    Made by <a href="https://github.com/metahat" target="_blank" rel="noopener noreferrer">Metahat</a>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('video');
      const urlInput = document.getElementById('url-input');
      const loadBtn = document.getElementById('load-btn');
      const logsDiv = document.getElementById('logs');
      const clearLogsBtn = document.getElementById('clear-logs-btn');
      
      let hls = null;

      function addLog(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
        logsDiv.appendChild(entry);
        logsDiv.scrollTop = logsDiv.scrollHeight; // Auto-scroll
      }

      clearLogsBtn.addEventListener('click', () => {
        logsDiv.innerHTML = '';
        addLog('Logs cleared.', 'info');
      });

      function destroyPlayer() {
        if (hls) {
          hls.destroy();
          hls = null;
          addLog('Destroyed previous HLS instance.', 'warning');
        }
        video.src = '';
      }

      function loadStream(url) {
        destroyPlayer();
        addLog(`Initializing stream: ${url}`, 'info');
        
        const proxyUrl = `/api/v1/streamingProxy?url=${encodeURIComponent(url)}`;
        addLog(`Proxy URL generated: ${proxyUrl}`, 'info');
        
        if (Hls.isSupported()) {
          addLog('HLS.js is supported. Attaching media...', 'info');
          hls = new Hls({
            debug: false,
            xhrSetup: function(xhr, url) {
              // Custom headers can be set here if needed by the frontend
            }
          });
          
          hls.loadSource(proxyUrl);
          hls.attachMedia(video);
          
          hls.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
            addLog(`Manifest parsed successfully! Found ${data.levels.length} quality levels.`, 'success');
            video.play().catch(e => {
              addLog(`Auto-play prevented by browser: ${e.message}`, 'warning');
            });
          });
          
          hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
              let errorMsg = `Fatal Error (${data.type}): ${data.details}`;
              
              // CORS / Network Error Detection
              if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                if (data.response && data.response.code === 0) {
                  errorMsg = `NETWORK ERROR: Connection refused or CORS policy violation detected! Status 0. (Check if the Proxy Server allows your origin or if the target blocked the proxy). Details: ${data.details}`;
                } else if (data.response && data.response.code >= 400) {
                   errorMsg = `HTTP Error ${data.response.code} fetching stream. Details: ${data.details}`;
                }
                addLog(errorMsg, 'error');
                hls.startLoad(); // attempt to recover
              } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                addLog(`MEDIA ERROR: ${data.details}. Attempting recovery...`, 'warning');
                hls.recoverMediaError();
              } else {
                addLog(errorMsg, 'error');
                destroyPlayer();
              }
            } else {
              addLog(`Non-fatal warning: ${data.details}`, 'warning');
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          addLog('Native HLS support detected (Safari).', 'info');
          video.src = proxyUrl;
          video.addEventListener('loadedmetadata', function() {
            addLog('Stream metadata loaded successfully!', 'success');
            video.play().catch(e => addLog(`Playback error: ${e.message}`, 'error'));
          });
          video.addEventListener('error', function() {
            const err = video.error;
            let msg = 'Unknown native video error.';
            if (err) {
              if (err.code === 4) msg = 'Format not supported or network/CORS error on native player.';
            }
            addLog(`Native Error: ${msg}`, 'error');
          });
        } else {
          addLog('HLS is not supported in this browser.', 'error');
        }
      }

      loadBtn.addEventListener('click', function() {
        const url = urlInput.value.trim();
        if (!url) {
          addLog('Error: URL input is empty.', 'error');
          return;
        }
        if (!url.includes('.m3u8')) {
          addLog('Warning: URL does not end with .m3u8. Attempting anyway...', 'warning');
        }
        loadStream(url);
      });

      // Default stream
      urlInput.value = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
    });
  </script>
</body>
</html>
